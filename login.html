<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#071826;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.login-box{
    background:#fff;
    width:350px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

input{
    height:50px;
    margin-bottom:15px;
}

button{
    width:100%;
    height:50px;
}

</style>

</head>


<body>


<div class="login-box">

<h2>
Admin Login
</h2>


<input 
id="email"
type="email"
class="form-control"
placeholder="Email">


<input 
id="password"
type="password"
class="form-control"
placeholder="Password">



<button 
onclick="login()"
class="btn btn-primary">

Login

</button>


<p id="msg" class="text-center mt-3"></p>


</div>



<script type="module" src="login.js"></script>


</body>

</html>
