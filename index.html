<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TS Dollar Exchange</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">

<h2>TS Dollar Exchange</h2>

</div>

<nav>

<a href="#">Home</a>

<a href="#">Exchange</a>

<a href="#">Rates</a>

<a href="#">Track</a>

<a href="#">Contact</a>

<a class="login-btn" href="admin.html">Login</a>

</nav>

</header>

<section class="hero">

<div class="overlay">

<h1>Trusted Dollar Exchange Platform</h1>

<p>
Buy & Sell USD, Payoneer, Wise, Skrill,
Perfect Money, USDT and more securely.
</p>

<a href="#exchange">

<button>

Exchange Now

</button>

</a>

</div>

</section>

<section id="exchange" class="exchange-box">

<div class="card">

<h2>You Send</h2>

<select>

<option>Choose Wallet</option>

<option>Payoneer</option>

<option>Wise</option>

<option>USDT</option>

<option>Skrill</option>

<option>Perfect Money</option>

</select>

<input type="number" placeholder="Amount">

</div>

<div class="card">

<h2>You Receive</h2>

<select>

<option>bKash</option>

<option>Nagad</option>

<option>Bank</option>

</select>

<input type="number" placeholder="Receive Amount">

</div>

<div class="card track">

<h2>Track Order</h2>

<input type="text" placeholder="Exchange ID">

<button>

Track Now

</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
